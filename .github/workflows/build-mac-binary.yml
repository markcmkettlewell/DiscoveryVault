# This is a GitHub Actions workflow that compiles install_cert.py into a macOS binary using PyInstaller

name: Build Mac Binary  

on:  
  push:  
    branches:  
      - main  

jobs:  
  build:  
    runs-on: macOS-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v2  
      - name: Set up Python  
        uses: actions/setup-python@v2  
        with:  
          python-version: '3.8'  
      - name: Install dependencies  
        run: |  
          python -m pip install --upgrade pip  
          pip install pyinstaller  
      - name: Create macOS binary  
        run: |  
          pyinstaller --onefile install_cert.py  
      - name: Archive the binary  
        uses: actions/upload-artifact@v2  
        with:  
          name: macos-binary  
          path: dist/install_cert  
