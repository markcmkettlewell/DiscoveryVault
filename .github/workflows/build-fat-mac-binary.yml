name: Build Universal macOS Binary

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # Trigger on version tags (e.g. v1.0.0)
    paths:
      - 'install_cert.py'
      - '.github/workflows/build-mac-binary.yml'
  workflow_dispatch:   # Manual trigger

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write   # Required for creating releases

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Universal Binary
        run: |
          pyinstaller --onefile \
            --target-arch universal2 \
            --name install_cert \
            install_cert.py

      - name: Verify Binary Architecture
        run: file dist/install_cert

      - name: Make Binary Executable
        run: chmod +x dist/install_cert

      - name: Sign Binary (ad-hoc)
        run: codesign -s - dist/install_cert

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: install_cert-macos-universal
          path: dist/install_cert
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/install_cert
          generate_release_notes: true
