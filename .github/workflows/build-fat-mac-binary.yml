name: Build Universal macOS Binary

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build for Apple Silicon (arm64)
        run: |
          pyinstaller --onefile --target-arch arm64 \
            --name install_cert-arm64 install_cert.py

      - name: Build for Intel (x86_64)
        run: |
          pyinstaller --onefile --target-arch x86_64 \
            --name install_cert-x86_64 install_cert.py

      - name: Combine into Universal Binary
        run: |
          lipo -create dist/install_cert-arm64 dist/install_cert-x86_64 \
               -output dist/install_cert
          file dist/install_cert
          chmod +x dist/install_cert

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: install_cert-macos-universal
          path: dist/install_cert
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/install_cert
          generate_release_notes: true
