name: Build Universal macOS Binary

on:
  push:
    branches:
      - main
    paths:
      - 'install_cert.py'
      - '.github/workflows/build-mac-binary.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyInstaller
        run: pip install pyinstaller
      
      - name: Build Universal Binary
        run: |
          pyinstaller --onefile \
            --target-arch universal2 \
            --name install_cert \
            install_cert.py
      
      - name: Verify Binary Architecture
        run: file dist/install_cert
      
      - name: Make Binary Executable
        run: chmod +x dist/install_cert
      
      - name: Sign Binary
        run: codesign -s - dist/install_cert
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: install_cert-macos-universal
          path: dist/install_cert
          retention-days: 30
      
      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/install_cert
